<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Schematizer Pro</title>
  <style>
    :root {
      --bg-color: #f3f4f6;
      --sidebar-bg: #ffffff;
      --panel-bg: #ffffff;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --text-main: #1f2937;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --code-bg: #1e1e1e;
    }
    
    body {
      margin: 0;
      display: flex;
      height: 100vh;
      font-family: 'Inter', 'Segoe UI', Tahoma, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
    }

    /* Современный сайдбар */
    #sidebar {
      width: 250px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      box-shadow: 2px 0 10px rgba(0,0,0,0.02);
      z-index: 10;
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      font-weight: 700;
      font-size: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .menu-item {
      padding: 12px 20px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.2s;
      font-size: 14px;
    }

    .menu-item:hover, .menu-item.active {
      background: #f0fdf4;
      border-left-color: #10b981;
      color: #047857;
      font-weight: 600;
    }

    /* Основная рабочая область */
    #main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Верхняя панель управления (ИИ) */
    .topbar {
      padding: 15px 20px;
      background: var(--panel-bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .ai-input-group {
      flex: 1;
      display: flex;
      gap: 10px;
    }

    input[type="text"], select {
      width: 100%;
      padding: 10px 15px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
    }

    button {
      padding: 10px 20px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    button:hover { background: var(--accent-hover); }

    /* Двойная панель: Конструктор и Результат */
    .workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Зона Drag and Drop (Конструктор) */
    .constructor-panel {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      gap: 20px;
    }

    .properties-list {
      width: 200px;
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
    }

    .draggable-prop {
      padding: 8px;
      background: white;
      border: 1px dashed #cbd5e1;
      border-radius: 4px;
      margin-bottom: 8px;
      cursor: grab;
      font-size: 13px;
    }

    .drop-zone {
      flex: 1;
      background: white;
      border: 2px dashed #94a3b8;
      border-radius: 12px;
      padding: 20px;
      min-height: 300px;
    }

    /* Панель Кода */
    .code-panel {
      width: 40%;
      background: var(--code-bg);
      color: #d4d4d4;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .code-header {
      padding: 10px 20px;
      background: #2d2d2d;
      border-bottom: 1px solid #404040;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #9cdcfe;
    }

    .btn-copy {
      background: #4b5563;
      padding: 6px 12px;
      font-size: 12px;
    }

    .btn-copy:hover { background: #6b7280; }

    pre {
      margin: 0;
      padding: 20px;
      overflow: auto;
      font-family: 'Consolas', monospace;
      font-size: 13px;
      flex: 1;
    }
  </style>
</head>
<body>

  <div id="sidebar">
    <div class="sidebar-header">
      Schematizer
      <span style="font-size: 12px; color: var(--text-muted); cursor: pointer;" title="Настройки">⚙️</span>
    </div>
    <div style="padding: 15px 20px; font-size: 12px; color: var(--text-muted); text-transform: uppercase;">Проекты</div>
    <div class="menu-item active">📁 Главный сайт</div>
    <div class="menu-item">📁 Блог компании</div>
    <div class="menu-item" style="color: var(--accent);">+ Добавить проект</div>
  </div>

  <div id="main-content">
    
    <div class="topbar">
      <div class="ai-input-group">
        <input type="text" placeholder="✨ Опиши страницу, и ИИ сам соберет все свойства...">
        <button style="background: #10b981;">Сгенерировать</button>
      </div>
      <select style="width: 200px;">
        <option>Article</option>
        <option>Product</option>
        <option>LocalBusiness</option>
      </select>
    </div>

    <div class="workspace">
      <div class="constructor-panel">
        <div class="properties-list">
          <div style="font-size: 12px; font-weight: bold; margin-bottom: 10px; color: var(--text-muted);">Доступные свойства</div>
          <div class="draggable-prop" draggable="true">description</div>
          <div class="draggable-prop" draggable="true">image</div>
          <div class="draggable-prop" draggable="true">aggregateRating</div>
          <div class="draggable-prop" draggable="true">offers</div>
        </div>
        
        <div class="drop-zone">
          <h3 style="margin-top: 0; color: #475569;">Конструктор свойств</h3>
          <p style="color: var(--text-muted); font-size: 14px;">Перетащите свойства сюда или воспользуйтесь ИИ для автозаполнения.</p>
          </div>
      </div>

      <div class="code-panel">
        <div class="code-header">
          <span>JSON-LD Output</span>
          <button class="btn-copy" onclick="copyJSON()">📋 Копировать</button>
        </div>
        <pre id="json-output">{
  "@context": "https://schema.org",
  "@type": "Article"
}</pre>
      </div>
    </div>
  </div>

  <script>
    function copyJSON() {
      const code = document.getElementById('json-output').innerText;
      navigator.clipboard.writeText(code).then(() => {
        alert('Успешно скопировано в буфер обмена!');
      });
    }
  </script>
</body>
</html>
